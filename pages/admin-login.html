<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Paters Group</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 2rem;
        }
        
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .login-header h1 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(196, 96, 79, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(196, 96, 79, 0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        .spinner {
            display: inline-block;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Admin Login</h1>
                <p>Paters Group Management</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="admin@patersgroup.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Login</span>
                </button>
            </form>

            <div class="login-footer">
                <p>🔐 Secure Admin Access Only</p>
                <p style="margin-top: 1rem; font-size: 0.85rem;">
                    Demo: admin@paters.com / password123
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"; import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"; // Firebase configuration const firebaseConfig
        = { apiKey: "AIzaSyDqzK38p9dG5YriZz3y66yDrmNjSeyGSas", authDomain: "paters-group.firebaseapp.com", projectId: "paters-group", storageBucket: "paters-group.firebasestorage.app", messagingSenderId: "548925676619", appId: "1:548925676619:web:b1ea6edb5d0f12c49641ce",
        measurementId: "G-7QQ4M1CSWZ" }; // Initialize Firebase const firebaseApp = initializeApp(firebaseConfig); const auth = getAuth(firebaseApp); // DOM Elements const loginForm = document.getElementById('loginForm'); const alertBox = document.getElementById('alertBox');
        const loginBtn = document.getElementById('loginBtn'); const btnText = document.getElementById('btnText'); // Login handler loginForm.addEventListener('submit', async (e) => { e.preventDefault(); const email = document.getElementById('email').value;
        const password = document.getElementById('password').value; // Disable button loginBtn.disabled = true; btnText.innerHTML = '<span class="spinner"></span>Logging in...'; try { const userCredential = await signInWithEmailAndPassword(auth,
        email, password); const user = userCredential.user; // Store user info in localStorage localStorage.setItem('auth_token', await user.getIdToken()); localStorage.setItem('user_data', JSON.stringify({ id: user.uid, email: user.email, name: user.displayName
        || 'Admin User' })); // Show success message showAlert('Login successful! Redirecting...', 'success'); // Redirect to admin dashboard setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1500); } catch (error) { showAlert(error.message
        || 'Login failed. Please try again.', 'danger'); loginBtn.disabled = false; btnText.textContent = 'Login'; } }); // Show alert messages function showAlert(message, type) { alertBox.className = `alert show alert-${type}`; alertBox.textContent =
        message; } // Check if already logged in window.addEventListener('load', () => { const token = localStorage.getItem('auth_token'); if (token) { window.location.href = 'admin-dashboard.html'; } });
    </script>
</body>

</html>
